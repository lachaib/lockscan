name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run check

      - name: Type check
        run: pnpm run typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build

      - name: Verify dist is committed
        run: |
          if [ -n "$(git diff --name-only dist/)" ]; then
            echo "dist/ is out of sync with the TypeScript sources."
            echo "Run 'pnpm run build' and commit the result."
            git diff dist/
            exit 1
          fi
