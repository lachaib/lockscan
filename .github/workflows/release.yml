name: Release

on:
  release:
    types: [published]

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Extract version from release tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          MAJOR_NUM=$(echo "$VERSION" | cut -d. -f1)
          MINOR_NUM=$(echo "$VERSION" | cut -d. -f2)
          echo "tag=$TAG"                                    >> "$GITHUB_OUTPUT"
          echo "new_version=$VERSION"                        >> "$GITHUB_OUTPUT"
          echo "major_tag=v${MAJOR_NUM}"                     >> "$GITHUB_OUTPUT"
          echo "minor_tag=v${MAJOR_NUM}.${MINOR_NUM}"        >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: refs/heads/main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      # ── Update package.json + build ─────────────────────────────────────────
      - name: Bump package.json
        run: |
          pnpm version ${{ steps.version.outputs.new_version }} --no-git-tag-version
          pnpm biome format --write package.json

      - name: Build
        run: pnpm run build

      # ── Commit version bump + dist/ ─────────────────────────────────────────
      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json && git add -f dist/action.cjs dist/action.cjs.map
          git commit -m "chore(release): ${{ steps.version.outputs.tag }}"
          git push origin main

      # ── Update floating tags ─────────────────────────────────────────────────
      # Point the major (e.g. v1) and minor (e.g. v1.2) tags at the release commit.
      - name: Update floating major and minor tags
        run: |
          git tag ${{ steps.version.outputs.major_tag }} -f ${{ steps.version.outputs.tag }}
          git tag ${{ steps.version.outputs.minor_tag }} -f ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.major_tag }} --force
          git push origin ${{ steps.version.outputs.minor_tag }} --force

      # ── Publish to npm ──────────────────────────────────────────────────────
      - name: Publish to npm
        run: pnpm publish --no-git-checks --access public --provenance

      # ── Build changelog + finalize release ──────────────────────────────────
      - name: Generate changelog
        id: changelog
        run: |
          LAST_TAG=$(git tag --list 'v*.*.*' --sort=-version:refname \
            | grep -v "^${{ steps.version.outputs.tag }}$" | head -1)
          if [ -n "$LAST_TAG" ]; then
            RANGE="${LAST_TAG}..${{ steps.version.outputs.tag }}"
          else
            RANGE="${{ steps.version.outputs.tag }}"
          fi

          NOTES_FILE=$(mktemp)

          DRAFT_BODY='${{ github.event.release.body }}'
          if [ -n "$DRAFT_BODY" ]; then
            printf '%s\n\n---\n\n' "$DRAFT_BODY" >> "$NOTES_FILE"
          fi

          echo "## What's changed" >> "$NOTES_FILE"
          echo "" >> "$NOTES_FILE"

          for TYPE in feat fix perf refactor chore docs; do
            LINES=$(git log "$RANGE" --format='- %s (%h)' \
              | grep -E "^- ${TYPE}(\([^)]*\))?!?:" || true)
            if [ -n "$LINES" ]; then
              case "$TYPE" in
                feat)     echo "### Features" >> "$NOTES_FILE" ;;
                fix)      echo "### Bug fixes" >> "$NOTES_FILE" ;;
                perf)     echo "### Performance" >> "$NOTES_FILE" ;;
                refactor) echo "### Refactoring" >> "$NOTES_FILE" ;;
                chore)    echo "### Maintenance" >> "$NOTES_FILE" ;;
                docs)     echo "### Documentation" >> "$NOTES_FILE" ;;
              esac
              echo "$LINES" >> "$NOTES_FILE"
              echo "" >> "$NOTES_FILE"
            fi
          done

          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: actions/github-script@v7
        env:
          NOTES_FILE: ${{ steps.changelog.outputs.notes_file }}
          NEW_TAG: ${{ steps.version.outputs.tag }}
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync(process.env.NOTES_FILE, 'utf8');
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: context.payload.release.id,
              tag_name: process.env.NEW_TAG,
              name: process.env.NEW_TAG,
              body,
              draft: false,
              prerelease: false,
            });
