name: Release

on:
  release:
    types: [published]

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Extract version from release tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          MAJOR_NUM=$(echo "$VERSION" | cut -d. -f1)
          MINOR_NUM=$(echo "$VERSION" | cut -d. -f2)
          echo "tag=$TAG"                                    >> "$GITHUB_OUTPUT"
          echo "new_version=$VERSION"                        >> "$GITHUB_OUTPUT"
          echo "major_tag=v${MAJOR_NUM}"                     >> "$GITHUB_OUTPUT"
          echo "minor_tag=v${MAJOR_NUM}.${MINOR_NUM}"        >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: refs/heads/main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      # ── Update package.json + build ─────────────────────────────────────────
      - name: Bump package.json
        run: |
          pnpm version ${{ steps.version.outputs.new_version }} --no-git-tag-version
          pnpm biome format --write package.json

      - name: Build
        run: pnpm run build

      # ── Commit version bump + dist/ ─────────────────────────────────────────
      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json && git add -f dist/action.cjs dist/action.cjs.map
          git commit -m "chore(release): ${{ steps.version.outputs.tag }}"
          git push origin main

      # ── Update floating tags ─────────────────────────────────────────────────
      # Point the major (e.g. v1) and minor (e.g. v1.2) tags at the release commit.
      - name: Update floating major and minor tags
        run: |
          git tag ${{ steps.version.outputs.major_tag }} -f ${{ steps.version.outputs.tag }}
          git tag ${{ steps.version.outputs.minor_tag }} -f ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.major_tag }} --force
          git push origin ${{ steps.version.outputs.minor_tag }} --force

      # ── Publish to npm ──────────────────────────────────────────────────────
      - name: Publish to npm
        run: pnpm publish --no-git-checks --access public --provenance

